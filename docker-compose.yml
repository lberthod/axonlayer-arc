# docker-compose for local dev / demo.
#
# Usage:
#   docker compose up --build
#   open http://localhost:8080          (frontend)
#   open http://localhost:3001/api/docs (Swagger UI)
#
# The backend writes its persistent state (ledger, tasks, users, providers)
# into the `./backend/src/data` volume so restarts do not wipe history.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arc-usdc-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Everything else is optional — override via a local .env file if needed.
      WALLET_PROVIDER: ${WALLET_PROVIDER:-simulated}
      PRICING_PROFILE: ${PRICING_PROFILE:-standard}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ONCHAIN_DRY_RUN: ${ONCHAIN_DRY_RUN:-true}
      ONCHAIN_NETWORK: ${ONCHAIN_NETWORK:-arc-testnet}
    volumes:
      - ./backend/src/data:/app/src/data
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: arc-usdc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: Prometheus scraping /api/metrics/prometheus every 15s.
  # Enable with: docker compose --profile observability up
  prometheus:
    image: prom/prometheus:latest
    container_name: arc-usdc-prometheus
    profiles: ["observability"]
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
