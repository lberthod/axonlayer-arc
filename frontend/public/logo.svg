<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E879F9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- Main hexagon shape representing the network -->
  <path d="M100 20 L170 60 L170 140 L100 180 L30 140 L30 60 Z" 
        fill="url(#logoGradient)" 
        stroke="url(#logoGradientLight)" 
        stroke-width="3"/>
  
  <!-- Inner node representing the hub/agent -->
  <circle cx="100" cy="100" r="25" fill="white" stroke="url(#logoGradient)" stroke-width="3"/>
  
  <!-- Connected nodes around the hub -->
  <circle cx="100" cy="55" r="8" fill="white"/>
  <circle cx="139" cy="77" r="8" fill="white"/>
  <circle cx="139" cy="123" r="8" fill="white"/>
  <circle cx="100" cy="145" r="8" fill="white"/>
  <circle cx="61" cy="123" r="8" fill="white"/>
  <circle cx="61" cy="77" r="8" fill="white"/>
  
  <!-- Connection lines from hub to nodes -->
  <line x1="100" y1="75" x2="100" y2="63" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="118" y1="88" x2="131" y2="81" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="118" y1="112" x2="131" y2="119" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="125" x2="100" y2="137" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="112" x2="69" y2="119" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="88" x2="69" y2="81" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="url(#logoGradient)"/>
</svg>
